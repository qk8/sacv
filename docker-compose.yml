version: "3.9"
services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: sacv-sandbox:latest
    container_name: sacv-sandbox
    volumes:
      - .:/workspace
    # Use ephemeral ports to match DockerContainerManager._start_container() behavior.
    # The workflow resolves actual host ports via 'docker inspect'.
    # For manual debugging, use: docker run -p 5005:5005 -p 9229:9229 sacv-sandbox:latest
    ports:
      - "0:5005"       # JDWP — ephemeral
      - "0:9229"       # CDP  — ephemeral
      - "0:8080"       # Spring Boot app — ephemeral
      - "0:16686"      # Jaeger query UI — ephemeral
      - "0:4317"       # OTel GRPC collector — ephemeral
      - "0:4318"       # OTel HTTP collector — ephemeral
    networks:
      - sacv-internal
    restart: "no"
    command: /sacv/sandbox-start.sh

networks:
  sacv-internal:
    driver: bridge
    internal: false   # Allow OTel + Jaeger HTTP; restrict at firewall level
